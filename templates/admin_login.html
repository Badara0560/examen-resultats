<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – DEF 2026</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='logo.svg') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="page-wrapper">
    <header>
      <div class="header-text">
        <h1>Administration</h1>
        <p class="header-sub">Résultats DEF 2026</p>
      </div>
    </header>
    <main>
      <div class="card" style="max-width:400px;margin:0 auto;">
        <h2>Connexion</h2>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="alert alert-error">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}
        <form method="POST">
          <div class="form-group">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" required autofocus />
          </div>
          <button type="submit" class="btn-search">Se connecter</button>
        </form>
        <p style="margin-top:1rem;text-align:center;">
          <a href="{{ url_for('index') }}">← Retour au site</a>
        </p>
      </div>
    </main>
  </div>
</body>
</html>
