<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion - Administration</title>
  <meta name="theme-color" content="#0e7a3a" />
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='logo.svg') }}" />
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='icons/icon-32.png') }}" />
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}" />
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="login-body">
  <div class="flag-strip"></div>
  <div class="login-wrap">
    <div class="login-card">
      <img src="{{ url_for('static', filename='logo.svg') }}" alt="Résultats des Examens au Mali" />
      <h1>Administration</h1>
      <p class="login-sub">Résultats des Examens au Mali</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-error" style="text-align:left;">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
            {{ message }}
          </div>
        {% endfor %}
      {% endwith %}

      <form method="POST">
        <div class="form-group">
          <label for="password"><svg viewBox="0 0 24 24"><path d="M5 13a2 2 0 0 1 2 -2h10a2 2 0 0 1 2 2v6a2 2 0 0 1 -2 2h-10a2 2 0 0 1 -2 -2v-6z"/><path d="M11 16a1 1 0 1 0 2 0a1 1 0 0 0 -2 0"/><path d="M8 11v-4a4 4 0 1 1 8 0v4"/></svg>Mot de passe</label>
          <input type="password" id="password" name="password" required autofocus />
        </div>
        <button type="submit" class="btn btn-primary">
          <svg viewBox="0 0 24 24"><path d="M9 8v-2a2 2 0 0 1 2 -2h7a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-7a2 2 0 0 1 -2 -2v-2"/><path d="M3 12h13l-3 -3"/><path d="M13 15l3 -3"/></svg>
          Se connecter
        </button>
      </form>
      <p class="form-hint" style="margin-top:1.2rem; text-align:center;">
        <a href="{{ url_for('index') }}">Retour à la vérification des résultats</a>
      </p>
    </div>
  </div>
</body>
</html>
