<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – DEF 2026</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='logo.svg') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="login-body">
  <div class="login-card">
    <img src="{{ url_for('static', filename='logo.svg') }}" alt="Logo" />
    <h2>Administration</h2>
    <p class="login-sub">Résultats des Examens au Mali</p>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-error">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}
    <form method="POST">
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" required autofocus />
      </div>
      <button type="submit" class="btn-search">Se connecter</button>
    </form>
    <p style="margin-top:1.25rem;text-align:center;">
      <a href="{{ url_for('index') }}">← Retour au site</a>
    </p>
  </div>
</body>
</html>
