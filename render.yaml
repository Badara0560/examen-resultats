# Two services:
#  1) examen-resultats-site — the PUBLIC results checker. A CDN-backed Render
#     Static Site (free, unlimited bandwidth, no cold start). Serves the fully
#     static front-end in ./static, which does all lookups client-side from the
#     JSON shards. THIS is what 100k users hit.
#  2) examen-resultats — the Flask app, used only for /admin (import/manage) and
#     as an API fallback.
services:
  - type: web
    name: examen-resultats-site
    runtime: static
    staticPublishPath: ./static
    pullRequestPreviewsEnabled: false
    headers:
      - path: /data/manifest.json
        name: Cache-Control
        value: public, max-age=60
      - path: /data/*
        name: Cache-Control
        value: public, max-age=604800, immutable
      - path: /*
        name: X-Content-Type-Options
        value: nosniff

  - type: web
    name: examen-resultats
    runtime: python
    plan: free
    healthCheckPath: /healthz
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --worker-class gthread --timeout 120 --graceful-timeout 30 --preload --max-requests 2000 --max-requests-jitter 200 --access-logfile - --error-logfile -
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: ADMIN_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: COOKIE_SECURE
        value: "1"
